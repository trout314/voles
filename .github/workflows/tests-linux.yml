name: Tests (Linux)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'

jobs:
  # Build the D extension inside an Ubuntu 20.04 container (glibc 2.31) and
  # upload the .so as an artifact for the test matrix below.
  # Linking on glibc 2.31 ensures the .so works on Ubuntu 20.04+, Debian 11+,
  # RHEL/AlmaLinux 8+, and Fedora 32+.
  build-dlang-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build D extension in Ubuntu 20.04 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq curl xz-utils ninja-build python3-pip libxml2
            pip3 install -q 'meson==1.5.2'
            curl -fL https://github.com/ldc-developers/ldc/releases/download/v1.36.0/ldc2-1.36.0-linux-x86_64.tar.xz \
              | tar -xJ -C /tmp
            export PATH=/tmp/ldc2-1.36.0-linux-x86_64/bin:\$PATH
            cd /work/dlang
            meson setup build --wipe --buildtype=release
            ninja -C build
            cp build/volterra_dlang.so /work/src/volterra_equation_solvers/
          "

      - name: Verify glibc requirement
        run: |
          max=$(objdump -T src/volterra_equation_solvers/volterra_dlang.so \
            | awk '/GLIBC/{match($0,/GLIBC_([0-9.]+)/,a); print a[1]}' \
            | sort -V | tail -1)
          echo "Max glibc version required: $max"
          python3 -c "
          def ver(s): return tuple(int(x) for x in s.split('.'))
          assert ver('$max') <= ver('2.31'), f'glibc {max!r} > 2.31'
          print('glibc requirement OK')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: volterra_dlang_so
          path: src/volterra_equation_solvers/volterra_dlang.so

  test-dlang:
    needs: build-dlang-linux
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: volterra_dlang_so
          path: src/volterra_equation_solvers/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
