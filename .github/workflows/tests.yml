name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'

jobs:
  # Test the Numba path across all supported Python versions.
  # This job does not build the D extension, so it also serves as the
  # regression test for the automatic Numba fallback on older distros
  # (glibc < 2.34: Ubuntu 20.04, Debian 11, RHEL 8, etc.).
  test-numba:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (Numba path)
        run: pytest tests/ -v

  # Build the D extension inside an Ubuntu 20.04 container (glibc 2.31)
  # using ldc2 1.41.0. Linking on glibc 2.31 ensures the resulting .so
  # references only
  # glibc symbols up to 2.31, covering Ubuntu 20.04+, Debian 11+,
  # RHEL/AlmaLinux 8+, and Fedora 32+.
  test-dlang:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build D extension in Ubuntu 20.04 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq curl xz-utils ninja-build python3-pip
            pip3 install -q 'meson==1.5.2'
            curl -fL https://github.com/ldc-developers/ldc/releases/download/v1.41.0/ldc2-1.41.0-linux-x86_64.tar.xz \
              | tar -xJ -C /tmp
            export PATH=/tmp/ldc2-1.41.0-linux-x86_64/bin:\$PATH
            cd /work/dlang
            meson setup build --wipe
            ninja -C build
            cp build/volterra_dlang.so /work/src/volterra_equation_solvers/
          "

      - name: Verify glibc requirement
        run: |
          max=$(objdump -T src/volterra_equation_solvers/volterra_dlang.so \
            | awk '/GLIBC/{match($0,/GLIBC_([0-9.]+)/,a); print a[1]}' \
            | sort -V | tail -1)
          echo "Max glibc version required: $max"
          # Fail if the requirement has crept above 2.31
          python3 -c "
          from functools import reduce
          def ver(s): return tuple(int(x) for x in s.split('.'))
          assert ver('$max') <= ver('2.31'), f'glibc {max!r} > 2.31'
          print('glibc requirement OK')
          "

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (D solver path)
        run: pytest tests/ -v

  test-dlang-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install meson and ninja
        run: brew install meson ninja

      - name: Download and extract ldc2
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && LDC_ARCH="arm64" || LDC_ARCH="x86_64"
          LDC_VERSION="1.41.0"
          curl -fL "https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/ldc2-${LDC_VERSION}-osx-${LDC_ARCH}.tar.gz" \
            | tar -xz -C "$HOME"
          echo "$HOME/ldc2-${LDC_VERSION}-osx-${LDC_ARCH}/bin" >> $GITHUB_PATH

      - name: Build D extension
        run: |
          cd dlang
          meson setup build --wipe
          ninja -C build
          cp build/volterra_dlang.dylib ../src/volterra_equation_solvers/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (D solver path)
        run: pytest tests/ -v

  test-dlang-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Download and extract ldc2
        shell: pwsh
        run: |
          $LDC_VERSION = "1.41.0"
          $archive = "ldc2-${LDC_VERSION}-windows-x64.7z"
          Invoke-WebRequest -Uri "https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/$archive" -OutFile "$env:TEMP\$archive"
          7z x "$env:TEMP\$archive" -o"$env:USERPROFILE"
          echo "$env:USERPROFILE\ldc2-${LDC_VERSION}-windows-x64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build D extension
        shell: pwsh
        run: |
          cd dlang
          meson setup build --wipe
          ninja -C build
          Copy-Item build\volterra_dlang.dll ..\src\volterra_equation_solvers\

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (D solver path)
        run: pytest tests/ -v
