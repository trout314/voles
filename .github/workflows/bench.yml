name: Benchmarks

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'

permissions:
  contents: write      # needed to push results to gh-pages and commit chart PNG

jobs:
  build-dlang:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build D extension in Ubuntu 20.04 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq curl xz-utils ninja-build python3-pip libxml2
            pip3 install -q 'meson==1.5.2'
            curl -fL https://github.com/ldc-developers/ldc/releases/download/v1.36.0/ldc2-1.36.0-linux-x86_64.tar.xz \
              | tar -xJ -C /tmp
            export PATH=/tmp/ldc2-1.36.0-linux-x86_64/bin:\$PATH
            cd /work/dlang
            meson setup build --wipe --buildtype=release
            ninja -C build
            cp build/volterra_dlang.so /work/src/volterra_equation_solvers/
          "

      - uses: actions/upload-artifact@v4
        with:
          name: volterra_dlang_so_bench
          path: src/volterra_equation_solvers/volterra_dlang.so

  benchmark:
    needs: build-dlang
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: volterra_dlang_so_bench
          path: src/volterra_equation_solvers/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" matplotlib

      - name: Run benchmarks
        run: |
          pytest benchmarks/bench_solvers.py \
            --benchmark-json output.json \
            --benchmark-warmup=on \
            --benchmark-warmup-iterations=1

      - name: Remove D library before gh-pages branch switch
        run: rm -f src/volterra_equation_solvers/volterra_dlang.so

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Generate benchmark charts
        run: python benchmarks/plot_results.py output.json benchmarks/results.png

      - name: Commit benchmark charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add benchmarks/results.png benchmarks/results_vec.png
          git diff --cached --quiet || git commit -m "Update benchmark charts [skip ci]"
          git push
