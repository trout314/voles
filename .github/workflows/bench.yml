name: Benchmarks

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'

permissions:
  contents: write      # needed to push results to gh-pages and commit chart PNG

jobs:
  build-dlang:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build D extension in Ubuntu 20.04 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq curl xz-utils ninja-build python3-pip libxml2
            pip3 install -q 'meson==1.5.2'
            curl -fL https://github.com/ldc-developers/ldc/releases/download/v1.36.0/ldc2-1.36.0-linux-x86_64.tar.xz \
              | tar -xJ -C /tmp
            export PATH=/tmp/ldc2-1.36.0-linux-x86_64/bin:\$PATH
            cd /work/dlang
            meson setup build --wipe --buildtype=release
            ninja -C build
            cp build/volterra_dlang.so /work/src/voles/
          "

      - uses: actions/upload-artifact@v4
        with:
          name: volterra_dlang_so_bench
          path: src/voles/volterra_dlang.so

  benchmark:
    needs: build-dlang
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: volterra_dlang_so_bench
          path: src/voles/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,callable]"

      - name: Run benchmarks
        run: |
          pytest benchmarks/bench_solvers.py \
            --benchmark-json output.json \
            --benchmark-warmup=on \
            --benchmark-warmup-iterations=1

      - name: Remove D library before gh-pages branch switch
        run: rm -f src/voles/volterra_dlang.so

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Update benchmark table in README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Regenerate the table against the freshest main and push, with a retry
          # loop for concurrent benchmark runs. We deliberately do NOT stash/rebase
          # a locally-edited README (the previous `git pull --rebase --autostash`
          # could leave Git conflict markers and then commit them): instead each
          # attempt resets to the latest origin tip and re-runs make_table.py on it.
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"   # untracked output.json is preserved
            python benchmarks/make_table.py output.json README.md
            # Hard safety net: never commit a README containing conflict markers.
            if grep -nE '^(<{7}|>{7}|={7})' README.md; then
              echo "::error::Conflict markers present in README after table generation; aborting." >&2
              exit 1
            fi
            if git diff --quiet -- README.md; then
              echo "No benchmark-table changes to commit."
              exit 0
            fi
            git add README.md
            git commit -m "Update benchmark table [skip ci]"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed benchmark table update on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (likely a concurrent run); retrying..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "::error::Failed to push benchmark table after 5 attempts." >&2
          exit 1
