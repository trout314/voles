name: Benchmarks

on:
  push:
    branches: [main]

permissions:
  contents: write      # needed to push results to gh-pages and commit chart PNG

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" matplotlib

      - name: Run benchmarks
        run: |
          pytest benchmarks/bench_solvers.py \
            --benchmark-json output.json \
            --benchmark-warmup=on \
            --benchmark-warmup-iterations=1

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Generate benchmark charts
        run: python benchmarks/plot_results.py output.json benchmarks/results.png

      - name: Commit benchmark charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add benchmarks/results_vie1.png benchmarks/results_vie2.png benchmarks/results_vide.png
          git diff --cached --quiet || git commit -m "Update benchmark charts [skip ci]"
          git push
