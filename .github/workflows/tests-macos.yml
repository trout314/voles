name: Tests (macOS)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'

jobs:
  test-dlang-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install meson and ninja
        run: brew install meson ninja

      - name: Download and extract ldc2
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && LDC_ARCH="arm64" || LDC_ARCH="x86_64"
          LDC_VERSION="1.42.0"
          BASE="https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/ldc2-${LDC_VERSION}"
          curl -fL "${BASE}-osx-universal.tar.xz" | tar -xJ -C "$HOME" 2>/dev/null \
            || curl -fL "${BASE}-osx-${LDC_ARCH}.tar.xz" | tar -xJ -C "$HOME"
          LDC_DIR=$(ls -d "$HOME"/ldc2-*/ | head -1)
          echo "${LDC_DIR}bin" >> $GITHUB_PATH

      - name: Build D extension
        run: |
          cd dlang
          meson setup build --wipe --buildtype=release
          ninja -C build
          cp build/volterra_dlang.dylib ../src/volterra_equation_solvers/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
