name: Build and publish wheels

# Triggered by version tags (e.g. v0.2.0) or manually for testing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # -------------------------------------------------------------------------
  # Linux x86_64 — built inside Ubuntu 20.04 (glibc 2.31) Docker container,
  # guaranteeing the .so works on Ubuntu 20.04 / Debian 11 / RHEL 8 and later.
  # Tagged manylinux_2_31_x86_64 so pip selects it on compatible systems.
  # -------------------------------------------------------------------------
  build-wheel-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build D extension in Ubuntu 20.04 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" ubuntu:20.04 bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq curl xz-utils ninja-build python3-pip libxml2
            pip3 install -q 'meson==1.5.2'
            curl -fL https://github.com/ldc-developers/ldc/releases/download/v1.36.0/ldc2-1.36.0-linux-x86_64.tar.xz \
              | tar -xJ -C /tmp
            export PATH=/tmp/ldc2-1.36.0-linux-x86_64/bin:\$PATH
            cd /work/dlang
            meson setup build --wipe --buildtype=release
            ninja -C build
            cp build/volterra_dlang.so /work/src/voles/
          "

      - name: Verify glibc requirement <= 2.31
        run: |
          max=$(objdump -T src/voles/volterra_dlang.so \
            | awk '/GLIBC/{match($0,/GLIBC_([0-9.]+)/,a); print a[1]}' \
            | sort -V | tail -1)
          echo "Max glibc version required: $max"
          python3 -c "
          def ver(s): return tuple(int(x) for x in s.split('.'))
          assert ver('$max') <= ver('2.31'), f'glibc {repr(\"$max\")} > 2.31'
          print('glibc requirement OK')
          "

      - name: Build wheel and re-tag as manylinux_2_31_x86_64
        run: |
          pip install build "wheel>=0.40.0"
          python -m build --wheel
          python -m wheel tags --platform-tag manylinux_2_31_x86_64 --remove dist/*.whl

      - name: Verify wheel contains D extension
        run: |
          python3 -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          exts = [n for n in names if n.endswith(('.so', '.dylib', '.dll'))]
          if not exts:
              print(f'ERROR: No compiled extension found in {whl}')
              print('Contents:', names)
              sys.exit(1)
          print(f'OK: {exts[0]}')
          "

      - name: Smoke-test wheel import
        run: |
          python -m venv /tmp/test-venv
          /tmp/test-venv/bin/pip install numpy
          /tmp/test-venv/bin/pip install dist/*.whl
          /tmp/test-venv/bin/python -c "from voles import solve_VIE_1, solve_VIE_2, solve_VIDE; print('Import OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x86_64
          path: dist/*.whl

  # -------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon, macOS 11+)
  # -------------------------------------------------------------------------
  build-wheel-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install meson and ninja
        run: brew install meson ninja

      - name: Download and extract ldc2
        run: |
          LDC_VERSION="1.42.0"
          curl -fL "https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/ldc2-${LDC_VERSION}-osx-universal.tar.xz" \
            | tar -xJ -C "$HOME" 2>/dev/null \
            || curl -fL "https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/ldc2-${LDC_VERSION}-osx-arm64.tar.xz" \
            | tar -xJ -C "$HOME"
          LDC_DIR=$(ls -d "$HOME"/ldc2-*/ | head -1)
          echo "${LDC_DIR}bin" >> $GITHUB_PATH

      - name: Build D extension
        run: |
          cd dlang
          meson setup build --wipe --buildtype=release
          ninja -C build
          cp build/volterra_dlang.dylib ../src/voles/

      - name: Build wheel and re-tag as macosx_11_0_arm64
        run: |
          pip install build "wheel>=0.40.0"
          python -m build --wheel
          python -m wheel tags --platform-tag macosx_11_0_arm64 --remove dist/*.whl

      - name: Verify wheel contains D extension
        run: |
          python3 -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          exts = [n for n in names if n.endswith(('.so', '.dylib', '.dll'))]
          if not exts:
              print(f'ERROR: No compiled extension found in {whl}')
              print('Contents:', names)
              sys.exit(1)
          print(f'OK: {exts[0]}')
          "

      - name: Smoke-test wheel import
        run: |
          python3 -m venv /tmp/test-venv
          /tmp/test-venv/bin/pip install numpy
          /tmp/test-venv/bin/pip install dist/*.whl
          /tmp/test-venv/bin/python -c "from voles import solve_VIE_1, solve_VIE_2, solve_VIDE; print('Import OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: dist/*.whl

  # -------------------------------------------------------------------------
  # Windows x64
  # -------------------------------------------------------------------------
  build-wheel-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install meson and ninja
        run: pip install meson ninja

      - name: Download and extract ldc2
        shell: pwsh
        run: |
          $LDC_VERSION = "1.41.0"
          $archive = "ldc2-${LDC_VERSION}-windows-x64.7z"
          Invoke-WebRequest -Uri "https://github.com/ldc-developers/ldc/releases/download/v${LDC_VERSION}/$archive" -OutFile "$env:TEMP\$archive"
          7z x "$env:TEMP\$archive" -o"$env:USERPROFILE"
          echo "$env:USERPROFILE\ldc2-${LDC_VERSION}-windows-x64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build D extension
        shell: pwsh
        run: |
          cd dlang
          meson setup build --wipe --buildtype=release
          ninja -C build
          Copy-Item build\volterra_dlang.dll ..\src\voles\

      - name: Build wheel and re-tag as win_amd64
        shell: bash
        run: |
          pip install build "wheel>=0.40.0"
          python -m build --wheel
          python -m wheel tags --platform-tag win_amd64 --remove dist/*.whl

      - name: Verify wheel contains D extension
        shell: bash
        run: |
          python -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          exts = [n for n in names if n.endswith(('.so', '.dylib', '.dll'))]
          if not exts:
              print(f'ERROR: No compiled extension found in {whl}')
              print('Contents:', names)
              sys.exit(1)
          print(f'OK: {exts[0]}')
          "

      - name: Smoke-test wheel import
        shell: bash
        run: |
          python -m venv test-venv
          test-venv/Scripts/pip install numpy
          test-venv/Scripts/pip install dist/*.whl
          test-venv/Scripts/python -c "from voles import solve_VIE_1, solve_VIE_2, solve_VIDE; print('Import OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-x64
          path: dist/*.whl

  # -------------------------------------------------------------------------
  # Publish wheels to PyPI using OIDC trusted publishing.
  #
  # This package distributes as wheels only; there is no sdist on PyPI because
  # the D extension is a required component and cannot be built by pip from
  # source without a D compiler.  Users on unsupported platforms should build
  # from source following CONTRIBUTING.md.
  #
  # One-time PyPI setup required (no secrets needed after this):
  #   1. Go to pypi.org → Your projects → voles → Publishing
  #   2. Add a Trusted Publisher:
  #        Owner:    trout314
  #        Repo:     voles
  #        Workflow: build-wheels.yml
  #        Env:      pypi
  # -------------------------------------------------------------------------
  publish:
    needs:
      - build-wheel-linux-x86_64
      - build-wheel-macos-arm64
      - build-wheel-windows-x64
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: dist

      - name: List distributions to be published
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
